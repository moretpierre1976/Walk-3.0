    // Create a rounded icon from the image for apple-touch-icon
    function makeRoundedIcon(size, callback) {
      var img = new Image();
      img.onload = function() {
        var canvas = document.createElement('canvas');
        canvas.width = size; canvas.height = size;
        var ctx = canvas.getContext('2d');
        ctx.fillStyle = '#f0ece3';
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, size * 0.2);
        ctx.fill();
        ctx.save();
        ctx.beginPath();
        ctx.roundRect(0, 0, size, size, size * 0.2);
        ctx.clip();
        // Draw image centred with padding
        var pad = size * 0.05;
        ctx.drawImage(img, pad, pad, size - pad*2, size - pad*2);
        ctx.restore();
        callback(canvas.toDataURL('image/png'));
      };
      img.src = _logoDataUri;
    }

    makeRoundedIcon(180, function(icon180) {
      makeRoundedIcon(512, function(icon512) {
        document.getElementById('apple-touch-icon').href = icon180;
        var manifest = {
          name: 'Local Walks', short_name: 'Local Walks',
          description: 'Organise local walks, invite friends and discover new routes.',
          start_url: './', display: 'standalone',
          background_color: '#F5F0E8', theme_color: '#3B5C4A',
          orientation: 'portrait-primary',
          icons: [
            { src: icon180, sizes: '180x180', type: 'image/png', purpose: 'any maskable' },
            { src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
          ]
        };
        var mblob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        document.getElementById('pwa-manifest').href = URL.createObjectURL(mblob);
      });
    });

    window._hikerIcon = _logoDataUri;

    // Service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        var sw = [
          'var CACHE="local-walks-v2";',
          'self.addEventListener("install",function(e){e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(["./"]);}));self.skipWaiting();});',
          'self.addEventListener("activate",function(e){e.waitUntil(caches.keys().then(function(ks){return Promise.all(ks.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));}));self.clients.claim();});',
          'self.addEventListener("fetch",function(e){if(e.request.method!=="GET")return;e.respondWith(fetch(e.request).catch(function(){return caches.match(e.request);}));});'
        ].join('\n');
        var swb = new Blob([sw], { type: 'application/javascript' });
        navigator.serviceWorker.register(URL.createObjectURL(swb)).catch(function(){});
      });
    }
  })();

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import { getFirestore, collection, doc, getDoc, setDoc, updateDoc, onSnapshot, query, orderBy, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    const app = initializeApp({ apiKey:"AIzaSyAN_nzc5VvyQPUyzjkNqfAVaVrKcYI4V1Q", authDomain:"newwalk-ebd2b.firebaseapp.com", projectId:"newwalk-ebd2b", storageBucket:"newwalk-ebd2b.firebasestorage.app", messagingSenderId:"787048551840", appId:"1:787048551840:web:fc6d03eb2ba46d183a40c5" });
    const db = getFirestore(app);
    window._db = {
      getUser: async (email) => { const s = await getDoc(doc(db,'users',email)); return s.exists()?s.data():null; },
      createUser: async (u) => { await setDoc(doc(db,'users',u.email),{...u,createdAt:serverTimestamp()}); },
      updateUser: async (email,fields) => { await updateDoc(doc(db,'users',email),{...fields,updatedAt:serverTimestamp()}); },
      listenUsers: (cb) => { return onSnapshot(collection(db,'users'),s=>cb(s.docs.map(d=>({...d.data()})))); },
      saveWalk: async (w) => { await setDoc(doc(db,'walks',w.id),{...w,updatedAt:serverTimestamp()}); },
      updateWalk: async (id,f) => { await updateDoc(doc(db,'walks',id),{...f,updatedAt:serverTimestamp()}); },
      listenWalks: (cb) => { const q=query(collection(db,'walks'),orderBy('createdAt','asc')); return onSnapshot(q,s=>cb(s.docs.map(d=>({id:d.id,...d.data()})))); }
    };
    window.dispatchEvent(new Event('firebase-ready'));
  </script>

    const getHashParams = () => { const h = window.location.hash; const wm = h.match(/^#walk\/([a-z0-9]+)$/); if (wm) return { page:'walk', id:wm[1] }; const um = h.match(/^#member\/([^/]+)$/); if (um) return { page:'member', id:decodeURIComponent(um[1]) }; return null; };
    const walkShareUrl = id => `${window.location.origin}${window.location.pathname}#walk/${id}`;
    const getDB = () => window._db;
    const getInitials = name => name ? name.split(' ').map(p=>p[0]).join('').toUpperCase().slice(0,2) : '?';
    const AVATAR_COLORS = ['#7C9B8A','#D4863A','#7BA7BC','#9B7C8A','#8A9B7C','#BC7BA7'];
    const avatarColor = email => AVATAR_COLORS[(email||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % AVATAR_COLORS.length];

    // ── Session helpers ────────────────────────────────────────────────────────
    const SESSION_KEY = 'localwalks_user';
    const saveSession = u => { try { localStorage.setItem(SESSION_KEY, JSON.stringify(u)); } catch(e){} };
    const loadSession = () => { try { const s=localStorage.getItem(SESSION_KEY); return s?JSON.parse(s):null; } catch(e){return null;} };
    const clearSession = () => { try { localStorage.removeItem(SESSION_KEY); } catch(e){} };

    // ── Auth Panel ─────────────────────────────────────────────────────────────
    function AuthPanel({ onLogin, context }) {
      const [tab, setTab] = useState('login');
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        const last = localStorage.getItem('localwalks_last_email')||'';
        if (last) setEmail(last);
      }, []);

      const doLogin = async (ev, pv) => {
        const existing = await getDB().getUser(ev);
        if (!existing) throw new Error('No account found. Please register first.');
        if (existing.password !== pv) throw new Error('Incorrect password.');
        return existing;
      };

      const tryCredentialLogin = async () => {
        if (!window.PasswordCredential) return false;
        try {
          const cred = await navigator.credentials.get({ password:true, mediation:'optional' });
          if (cred && cred.id && cred.password) {
            setLoading(true); setError('');
            const user = await doLogin(cred.id.toLowerCase(), cred.password);
            saveSession(user); localStorage.setItem('localwalks_last_email', cred.id.toLowerCase());
            onLogin(user); return true;
          }
        } catch(e) {}
        setLoading(false); return false;
      };

      useEffect(() => { if (tab==='login' && context==='home') tryCredentialLogin(); }, []);

      const handle = async () => {
        setError('');
        const ev=email.trim().toLowerCase(), pv=password.trim(), nv=name.trim();
        if (!ev||!pv||(tab==='register'&&!nv)) { setError('Please fill in all fields.'); return; }
        setLoading(true);
        try {
          if (tab==='register') {
            const existing = await getDB().getUser(ev);
            if (existing) { setError('Email already registered. Please sign in.'); setLoading(false); return; }
            const user = { id:genId(), name:nv, email:ev, password:pv };
            await getDB().createUser(user);
            if (window.PasswordCredential) { try { await navigator.credentials.store(new PasswordCredential({id:ev,password:pv,name:nv})); } catch(e){} }
            saveSession(user); localStorage.setItem('localwalks_last_email', ev); onLogin(user);
          } else {
            const user = await doLogin(ev, pv);
            if (window.PasswordCredential) { try { await navigator.credentials.store(new PasswordCredential({id:ev,password:pv,name:user.name})); } catch(e){} }
            saveSession(user); localStorage.setItem('localwalks_last_email', ev); onLogin(user);
          }
        } catch(e) { setError(e.message||'Connection error. Try again.'); }
        setLoading(false);
      };

      return (
        <div className="auth-panel">
          <div className="auth-title">🌿 Welcome</div>
          <div className="auth-sub">{context==='join'?'Sign in or register to join this walk.':'Join your local walking community.'}</div>
          <div className="auth-tabs">
            <button className={`auth-tab ${tab==='login'?'active':''}`} onClick={()=>{setTab('login');setError('');}}>Sign In</button>
            <button className={`auth-tab ${tab==='register'?'active':''}`} onClick={()=>{setTab('register');setError('');}}>Create Account</button>
          </div>
          {tab==='login'&&window.PasswordCredential&&<><button className="btn-biometric" onClick={tryCredentialLogin} disabled={loading}><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2z"/><path d="M8 12s1.5-2 4-2 4 2 4 2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>Sign in with Face ID / Touch ID</button><div className="biometric-divider">or sign in with email</div></>}
          {tab==='register'&&<div className="field"><label>Your Name</label><input placeholder="Jane Smith" value={name} onChange={e=>setName(e.target.value)} autoComplete="name"/></div>}
          <div className="field"><label>Email</label><input type="email" placeholder="you@example.com" value={email} onChange={e=>setEmail(e.target.value)} autoComplete={tab==='register'?'email':'username'} inputMode="email"/></div>
          <div className="field"><label>Password</label><input type="password" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==='Enter'&&handle()} autoComplete={tab==='register'?'new-password':'current-password'}/></div>
          {error&&<div className="error-msg">{error}</div>}
          <div style={{height:14}}/>
          <button className="btn-primary" onClick={handle} disabled={loading}>{loading?'Please wait...':tab==='register'?'Create Account & Continue':'Sign In'}</button>
        </div>
      );
    }

    // ── Profile Edit Modal ─────────────────────────────────────────────────────
    function ProfileEditModal({ user, onClose, onSave }) {
      const [firstName, setFirstName] = useState(user.firstName||'');
      const [lastName, setLastName] = useState(user.lastName||'');
      const [age, setAge] = useState(user.age||'');
      const [occupation, setOccupation] = useState(user.occupation||'');
      const [hobbiesInput, setHobbiesInput] = useState('');
      const [hobbies, setHobbies] = useState(user.hobbies||[]);
      const [notes, setNotes] = useState(user.notes||'');
      const [saving, setSaving] = useState(false);

      const addHobby = () => { const h=hobbiesInput.trim(); if(h&&!hobbies.includes(h)&&hobbies.length<10){setHobbies([...hobbies,h]);setHobbiesInput('');} };

      const save = async () => {
        setSaving(true);
        const fields = { firstName:firstName.trim(), lastName:lastName.trim(), age:age?parseInt(age)||'':'', occupation:occupation.trim(), hobbies, notes:notes.slice(0,100), displayName:(firstName.trim()||lastName.trim()) ? `${firstName.trim()} ${lastName.trim()}`.trim() : user.name };
        await onSave(fields);
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">
            <div className="modal-title">✏️ Edit Your Profile</div>
            <div className="two-col">
              <div className="field"><label>First Name</label><input placeholder="Jane" value={firstName} onChange={e=>setFirstName(e.target.value)} autoComplete="given-name"/></div>
              <div className="field"><label>Last Name</label><input placeholder="Smith" value={lastName} onChange={e=>setLastName(e.target.value)} autoComplete="family-name"/></div>
            </div>
            <div className="two-col">
              <div className="field"><label>Age</label><input type="number" placeholder="32" min="1" max="120" value={age} onChange={e=>setAge(e.target.value)}/></div>
              <div className="field"><label>Occupation</label><input placeholder="e.g. Teacher" value={occupation} onChange={e=>setOccupation(e.target.value)}/></div>
            </div>
            <div className="field">
              <label>Hobbies (press Enter or + to add)</label>
              <div className="guests-input-row">
                <div className="field"><input placeholder="e.g. Photography" value={hobbiesInput} onChange={e=>setHobbiesInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addHobby()}/></div>
                <button className="btn-add-guest" onClick={addHobby}>+</button>
              </div>
              <div style={{marginTop:8,display:'flex',flexWrap:'wrap',gap:6}}>
                {hobbies.map(h=><span key={h} className="invited-chip">{h}<button className="btn-remove-guest" onClick={()=>setHobbies(hobbies.filter(x=>x!==h))}>✕</button></span>)}
              </div>
            </div>
            <div className="field">
              <label>Notes (max 100 characters)</label>
              <textarea placeholder="A little about yourself..." value={notes} onChange={e=>setNotes(e.target.value.slice(0,100))} style={{minHeight:70}}/>
              <div className="char-count">{notes.length}/100</div>
            </div>
            <div className="modal-footer">
              <button className="btn-secondary" onClick={onClose}>Cancel</button>
              <button className="btn-primary" style={{width:'auto',padding:'10px 28px'}} onClick={save} disabled={saving}>{saving?'Saving...':'Save Profile'}</button>
            </div>
          </div>
        </div>
      );
    }

    // ── My Profile Page ────────────────────────────────────────────────────────
    function MyProfilePage({ currentUser, onUpdateUser }) {
      const [showEdit, setShowEdit] = useState(false);
      const u = currentUser;
      const displayName = (u.firstName||u.lastName) ? `${u.firstName||''} ${u.lastName||''}`.trim() : u.name;

      const handleSave = async (fields) => {
        await getDB().updateUser(u.email, fields);
        const updated = { ...u, ...fields };
        onUpdateUser(updated);
        setShowEdit(false);
      };

      return (
        <div className="profile-page">
          <div className="profile-header-card">
            <div className="profile-avatar" style={{background:avatarColor(u.email)}}>{getInitials(displayName)}</div>
            <div className="profile-header-info">
              <div className="profile-header-name">{displayName}</div>
              <div className="profile-header-email">{u.email}</div>
              {u.occupation&&<div className="profile-header-occupation">💼 {u.occupation}</div>}
            </div>
            <button className="profile-edit-btn" onClick={()=>setShowEdit(true)}>✏️ Edit Profile</button>
          </div>

          <div className="profile-card">
            <div className="profile-card-title">👤 Personal Details</div>
            <div className="profile-grid">
              <div className="profile-field">
                <div className="profile-field-label">First Name</div>
                <div className={u.firstName?'profile-field-value':'profile-field-empty'}>{u.firstName||'Not set'}</div>
              </div>
              <div className="profile-field">
                <div className="profile-field-label">Last Name</div>
                <div className={u.lastName?'profile-field-value':'profile-field-empty'}>{u.lastName||'Not set'}</div>
              </div>
              <div className="profile-field">
                <div className="profile-field-label">Age</div>
                <div className={u.age?'profile-field-value':'profile-field-empty'}>{u.age||'Not set'}</div>
              </div>
              <div className="profile-field">
                <div className="profile-field-label">Occupation</div>
                <div className={u.occupation?'profile-field-value':'profile-field-empty'}>{u.occupation||'Not set'}</div>
              </div>
            </div>
          </div>

          {(u.hobbies&&u.hobbies.length>0) && (
            <div className="profile-card">
              <div className="profile-card-title">🎯 Hobbies & Interests</div>
              <div className="profile-hobbies">{u.hobbies.map(h=><span key={h} className="hobby-chip">{h}</span>)}</div>

          {u.notes && (
            <div className="profile-card">
              <div className="profile-card-title">📝 Notes</div>
              <div className="profile-notes-text">{u.notes}</div>

          )}

          {!u.firstName&&!u.occupation&&!u.notes && (
            <div className="empty-state" style={{padding:'30px 20px'}}>
              <div className="empty-icon">✍️</div>
              <div className="empty-title">Complete your profile</div>
              <div className="empty-sub">Add your details so other walkers can get to know you!</div>
              <button className="btn-primary" style={{width:'auto',padding:'10px 24px',marginTop:20}} onClick={()=>setShowEdit(true)}>Add Profile Info</button>
            </div>
          )}

          {showEdit&&<ProfileEditModal user={currentUser} onClose={()=>setShowEdit(false)} onSave={handleSave}/>}
        </div>
      );
    }

        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">

                <div className="member-modal-name">{displayName}{isYou&&<span className="member-you-badge">You</span>}</div>

    // ── Members Page ───────────────────────────────────────────────────────────
    function MembersPage({ users, currentUser, onViewMember }) {
      const [search, setSearch] = useState('');
      const [selectedMember, setSelectedMember] = useState(null);

      const filtered = users.filter(u => {
        if (!search.trim()) return true;
        const q = search.toLowerCase();
        const name = ((u.firstName||'')+' '+(u.lastName||'')+' '+u.name).toLowerCase();
        return name.includes(q)||(u.occupation||'').toLowerCase().includes(q)||(u.hobbies||[]).some(h=>h.toLowerCase().includes(q));
      }).sort((a,b) => {
        if (a.email===currentUser.email) return -1;
        if (b.email===currentUser.email) return 1;
        return ((a.firstName||a.name)||('')).localeCompare((b.firstName||b.name)||(''));
      });

      return (
        <div className="main">
          <div className="section-header">
            <div className="section-title">Walking Community</div>
            <div style={{fontSize:13,color:'#8C8478'}}>{users.length} {users.length===1?'member':'members'}</div>
          </div>
          <div className="field" style={{marginBottom:20}}>
            <input placeholder="🔍 Search by name, occupation or hobby..." value={search} onChange={e=>setSearch(e.target.value)} style={{background:'#fff'}}/>
          </div>
          {filtered.length===0?<div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">No members found</div><div className="empty-sub">Try a different search term.</div></div>:(
            <div className="members-grid">
              {filtered.map(u => {
                const isYou = u.email===currentUser.email;
                const displayName = (u.firstName||u.lastName)?`${u.firstName||''} ${u.lastName||''}`.trim():u.name;
                return (
                  <div key={u.email} className="member-card" onClick={()=>setSelectedMember(u)}>

                      <div className="member-avatar" style={{background:avatarColor(u.email)}}>{getInitials(displayName)}</div>
                      <div>
                        <div className="member-name">{displayName}{isYou&&<span className="member-you-badge">You</span>}</div>
                        <div className="member-occupation">{u.occupation||<span style={{opacity:0.5,fontStyle:'italic'}}>No occupation listed</span>}</div>
                      </div>
                    </div>
                    <div className="member-card-body">
                      {u.age&&<span className="member-age-badge">Age {u.age}</span>}
                      {u.hobbies&&u.hobbies.length>0&&<div className="member-hobbies">{u.hobbies.slice(0,4).map(h=><span key={h} className="hobby-chip" style={{fontSize:11}}>{h}</span>)}{u.hobbies.length>4&&<span className="hobby-chip" style={{fontSize:11}}>+{u.hobbies.length-4}</span>}</div>}
                      {u.notes&&<div className="member-notes">"{u.notes}"</div>}
                      {!u.age&&!u.hobbies?.length&&!u.notes&&<div style={{color:'#B8CEBF',fontSize:12,fontStyle:'italic'}}>Profile not yet filled in</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
          {selectedMember&&<MemberModal member={selectedMember} currentUser={currentUser} onClose={()=>setSelectedMember(null)}/>}
        </div>
      );
    }

    // ── Walk Modal ─────────────────────────────────────────────────────────────
    function WalkModal({ walk, currentUser, onClose, onSave, mode }) {
      const [title, setTitle] = useState(walk?.title||'');
      const [date, setDate] = useState(walk?.date||'');
      const [time, setTime] = useState(walk?.time||'');
      const [location, setLocation] = useState(walk?.location||'');
      const [description, setDescription] = useState(walk?.description||'');
      const [guestInput, setGuestInput] = useState('');
      const [guests, setGuests] = useState(walk?.invitedGuests||[]);
      const [error, setError] = useState('');
      const [saving, setSaving] = useState(false);

      const addGuest = () => { const g=guestInput.trim(); if(g&&!guests.includes(g)){setGuests([...guests,g]);setGuestInput('');} };
      const save = async () => {
        if(!title.trim()||!date||!time||!location.trim()){setError('Please fill in title, date, time and location.');return;}
        setSaving(true);
        await onSave({ id:walk?.id||genId(), title:title.trim(), date, time, location:location.trim(), description:description.trim(), invitedGuests:guests, creatorId:walk?.creatorId||currentUser.id, creatorName:walk?.creatorName||currentUser.name, joinedUsers:walk?.joinedUsers||[], status:walk?.status||'active', createdAt:walk?.createdAt||Date.now() });
        setSaving(false);
      };

      return (
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div className="modal">
            <div className="modal-title">{mode==='edit'?'Edit Walk':'Plan a New Walk'}</div>
            <div className="field"><label>Walk Title</label><input placeholder="e.g. Morning Meadow Stroll" value={title} onChange={e=>setTitle(e.target.value)}/></div>
            <div className="two-col">
              <div className="field"><label>Date</label><input type="date" value={date} onChange={e=>setDate(e.target.value)}/></div>
              <div className="field"><label>Start Time</label><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div>
            </div>
            <div className="field"><label>Start Location</label><input placeholder="e.g. Car park, Riverside Park" value={location} onChange={e=>setLocation(e.target.value)}/></div>
            <div className="field"><label>Description (optional)</label><textarea placeholder="Walk details, difficulty, what to bring..." value={description} onChange={e=>setDescription(e.target.value)}/></div>
            <div className="field">
              <label>Invite Guests by Name</label>
              <div className="guests-input-row">
                <div className="field"><input placeholder="Guest name" value={guestInput} onChange={e=>setGuestInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addGuest()}/></div>
                <button className="btn-add-guest" onClick={addGuest}>+</button>
              </div>
              <div style={{marginTop:6}}>{guests.map(g=><span key={g} className="invited-chip">{g}<button className="btn-remove-guest" onClick={()=>setGuests(guests.filter(x=>x!==g))}>✕</button></span>)}</div>
            </div>
            {error&&<div className="error-msg">{error}</div>}
            <div className="modal-footer">
              <button className="btn-secondary" onClick={onClose}>Cancel</button>
              <button className="btn-primary" style={{width:'auto',padding:'10px 28px'}} onClick={save} disabled={saving}>{saving?'Saving...':mode==='edit'?'Save Changes':'Create Walk'}</button>
            </div>
          </div>
        </div>
      );
    }

    // ── Walk Detail Page ───────────────────────────────────────────────────────
    function WalkDetailPage({ walkId, currentUser, onLogin, onEdit, onCancel, onJoin, onLeave, allWalks }) {
      const [showShare, setShowShare] = useState(true);
      const walk = allWalks.find(w=>w.id===walkId);
      if (!walk) return <div className="main"><div className="empty-state"><div className="empty-icon">🔍</div><div className="empty-title">Walk not found</div></div></div>;
      const isCreator = currentUser&&walk.creatorId===currentUser.id;
      const isJoined = currentUser&&(walk.joinedUsers||[]).some(u=>u.id===currentUser.id);
      const isCancelled = walk.status==='cancelled';
      const total = (walk.invitedGuests?.length||0)+(walk.joinedUsers?.length||0);
      return (
        <div className="main">
          <div className="walk-detail">
            <div className="walk-detail-hero">
              <div className="walk-detail-label">🥾 Local Walk</div>
              <div className="walk-detail-title">{walk.title}</div>
              <div className="walk-detail-organiser">Organised by {walk.creatorName}</div>
            </div>
            <div className="walk-detail-body">
              {isCancelled&&<div className="cancelled-banner">⚠️ This walk has been cancelled.</div>}
              <div className="walk-detail-meta">
                <div className="meta-card"><div className="meta-card-icon">📅</div><div className="meta-card-label">Date</div><div className="meta-card-val">{formatDate(walk.date)}</div></div>
                <div className="meta-card"><div className="meta-card-icon">🕐</div><div className="meta-card-label">Start Time</div><div className="meta-card-val">{formatTime(walk.time)}</div></div>
                <div className="meta-card"><div className="meta-card-icon">📍</div><div className="meta-card-label">Meeting Point</div><div className="meta-card-val">{walk.location}</div></div>
                <div className="meta-card"><div className="meta-card-icon">👥</div><div className="meta-card-label">Going</div><div className="meta-card-val">{total} {total===1?'person':'people'}</div></div>
              </div>
              {walk.description&&<div className="walk-detail-desc">{walk.description}</div>}
              {total>0&&<div className="walkers-section"><div className="walkers-title">Who's coming</div><div className="walkers-chips">{(walk.invitedGuests||[]).map(g=><span key={g} className="walker-chip">🙋 {g}</span>)}{(walk.joinedUsers||[]).map(u=><span key={u.id} className="walker-chip">✅ {u.name}</span>)}</div></div>}
              {!isCancelled&&showShare&&<ShareBox walk={walk}/>}
              <div className="detail-actions">
                {!isCancelled&&<button className="btn-share" onClick={()=>setShowShare(s=>!s)}>🔗 {showShare?'Hide share':'Share walk'}</button>}
                {currentUser&&isCreator&&!isCancelled&&<><button className="btn-secondary" onClick={()=>onEdit(walk)}>Edit</button><button className="btn-danger" onClick={()=>onCancel(walk.id)}>Cancel Walk</button></>}
                {currentUser&&!isCreator&&!isCancelled&&(isJoined?<button className="btn-secondary" onClick={()=>onLeave(walk.id)}>Leave Walk</button>:<button className="btn-primary" style={{width:'auto',padding:'10px 28px'}} onClick={()=>onJoin(walk.id)}>✓ Join This Walk</button>)}
              </div>
              {!currentUser&&!isCancelled&&<div className="join-prompt"><div className="join-prompt-title">Want to join this walk?</div><div className="join-prompt-sub">Create a free account or sign in to confirm your spot.</div><AuthPanel onLogin={onLogin} context="join"/></div>}
            </div>
          </div>
        </div>
      );
    }

    // ── Walk Card ──────────────────────────────────────────────────────────────
    function WalkCard({ walk, currentUser, onEdit, onCancel, onJoin, onLeave, onViewDetail }) {
      const [showShare, setShowShare] = useState(false);
      const isCreator = walk.creatorId===currentUser.id;
      const isJoined = (walk.joinedUsers||[]).some(u=>u.id===currentUser.id);
      const isCancelled = walk.status==='cancelled';
      const total = (walk.invitedGuests?.length||0)+(walk.joinedUsers?.length||0);
      return (
        <div className={`walk-card ${isCancelled?'cancelled':''}`}>
          <div className={`walk-card-accent ${isCancelled?'cancelled':isCreator?'mine':''}`}/>
          <div className="walk-card-body">
            <div className="walk-card-top">
              <div className="walk-name" onClick={()=>onViewDetail(walk.id)}>{walk.title}</div>
              <div style={{display:'flex',gap:5,flexShrink:0}}>
                {isCancelled&&<span className="walk-badge badge-cancelled">Cancelled</span>}
                {!isCancelled&&isCreator&&<span className="walk-badge badge-yours">Your Walk</span>}
                {!isCancelled&&!isCreator&&isJoined&&<span className="walk-badge badge-joined">Joined</span>}
              </div>
            </div>
            <div className="walk-meta">
              <div className="meta-item">📅 {formatDate(walk.date)}</div>
              <div className="meta-item">🕐 {formatTime(walk.time)}</div>
              <div className="meta-item">📍 {walk.location}</div>
              {total>0&&<div className="meta-item">👥 {total} going</div>}
            </div>
            {walk.description&&<div className="walk-desc">{walk.description}</div>}
            {total>0&&<div className="walk-guests"><div className="guests-label">Who's coming</div><div className="guests-list">{(walk.invitedGuests||[]).map(g=><span key={g} className="guest-chip">🙋 {g}</span>)}{(walk.joinedUsers||[]).map(u=><span key={u.id} className="guest-chip">✅ {u.name}</span>)}</div></div>}
            {showShare&&<ShareBox walk={walk}/>}
            <div className="walk-actions">
              {!isCancelled&&<button className="btn-share" onClick={()=>setShowShare(s=>!s)}>🔗 Share</button>}
              <button className="btn-secondary" onClick={()=>onViewDetail(walk.id)}>View</button>
              {isCreator&&!isCancelled&&<><button className="btn-secondary" onClick={()=>onEdit(walk)}>Edit</button><button className="btn-danger" onClick={()=>onCancel(walk.id)}>Cancel</button></>}
              {!isCreator&&!isCancelled&&(isJoined?<button className="btn-secondary" onClick={()=>onLeave(walk.id)}>Leave</button>:<button className="btn-primary" style={{width:'auto',padding:'9px 18px',fontSize:13}} onClick={()=>onJoin(walk.id)}>Join Walk</button>)}
            </div>
          </div>
        </div>
      );
    }

    // ── Walks List Page ────────────────────────────────────────────────────────
    function WalksPage({ walks, currentUser, dbStatus, onEdit, onCancel, onJoin, onLeave, onViewDetail, onNewWalk, filter, setFilter }) {
      const filteredWalks = walks
        .filter(w=>{if(filter==='mine')return w.creatorId===currentUser.id;if(filter==='joined')return(w.joinedUsers||[]).some(u=>u.id===currentUser.id);if(filter==='upcoming')return w.status==='active'&&new Date(`${w.date}T${w.time}`)>=new Date();return true;})
        .sort((a,b)=>new Date(`${a.date}T${a.time}`)-new Date(`${b.date}T${b.time}`));
      return (
        <main className="main has-mobile-nav">
          <div className="section-header">
            <div className="section-title">Upcoming Walks</div>
            <button className="btn-new-walk" onClick={onNewWalk}>+ Plan a Walk</button>
          </div>
          <div className={`status-bar ${dbStatus}`}><div className={`status-dot ${dbStatus}`}/>{dbStatus==='connected'?'● Live — changes sync instantly':dbStatus==='connecting'?'Connecting...':'Connection error'}</div>
          <div className="filter-bar">
            {[['all','All Walks'],['upcoming','Upcoming'],['mine','My Walks'],['joined','Joined']].map(([val,label])=>(
              <button key={val} className={`filter-btn ${filter===val?'active':''}`} onClick={()=>setFilter(val)}>{label}</button>
            ))}
          </div>
          {filteredWalks.length===0?<div className="empty-state"><div className="empty-icon">🌳</div><div className="empty-title">No walks here yet</div><div className="empty-sub">Plan your first walk and share it with friends!</div></div>:(
            <div className="walks-grid">
              {filteredWalks.map(walk=><WalkCard key={walk.id} walk={walk} currentUser={currentUser} onEdit={onEdit} onCancel={onCancel} onJoin={onJoin} onLeave={onLeave} onViewDetail={onViewDetail}/>)}
            </div>
          )}
        </main>
      );
    }

    // ── Main App ───────────────────────────────────────────────────────────────
    function App() {
      const [walks, setWalks] = useState([]);
      const [users, setUsers] = useState([]);
      const [currentUser, setCurrentUser] = useState(() => loadSession());
      const [page, setPage] = useState('walks'); // walks | profile | members
      const [showModal, setShowModal] = useState(false);
      const [editingWalk, setEditingWalk] = useState(null);
      const [filter, setFilter] = useState('all');
      const [hashParams, setHashParams] = useState(null);
      const [dbStatus, setDbStatus] = useState('connecting');
      const unsubWalks = useRef(null);
      const unsubUsers = useRef(null);

      useEffect(() => {
        const readHash = () => setHashParams(getHashParams());
        readHash();
        window.addEventListener('hashchange', readHash);
        return () => window.removeEventListener('hashchange', readHash);
      }, []);

      useEffect(() => {
        const start = () => {
          try {
            unsubWalks.current = getDB().listenWalks(lw => { setWalks(lw); setDbStatus('connected'); });
            unsubUsers.current = getDB().listenUsers(lu => setUsers(lu));
          } catch(e) { setDbStatus('error'); }
        };
        if (window._db) { start(); } else { window.addEventListener('firebase-ready', start, {once:true}); }
        return () => { if(unsubWalks.current) unsubWalks.current(); if(unsubUsers.current) unsubUsers.current(); };
      }, []);

      const handleLogin = u => { setCurrentUser(u); saveSession(u); };
      const handleLogout = () => { setCurrentUser(null); clearSession(); setPage('walks'); window.location.hash=''; };
      const handleUpdateUser = updated => { setCurrentUser(updated); saveSession(updated); };

      const goHome = () => { window.location.hash=''; setHashParams(null); };
      const goDetail = id => { window.location.hash=`walk/${id}`; setHashParams({page:'walk',id}); };

      const handleSaveWalk = async walk => { await getDB().saveWalk(walk); setShowModal(false); setEditingWalk(null); };
      const handleCancel = async id => { if(!window.confirm('Cancel this walk?'))return; await getDB().updateWalk(id,{status:'cancelled'}); };
      const handleJoin = async id => {
        if(!currentUser)return;
        const walk=walks.find(w=>w.id===id);
        if(!walk||(walk.joinedUsers||[]).some(u=>u.id===currentUser.id))return;
        await getDB().updateWalk(id,{joinedUsers:[...(walk.joinedUsers||[]),{id:currentUser.id,name:currentUser.name}]});
      };
      const handleLeave = async id => {
        const walk=walks.find(w=>w.id===id); if(!walk)return;
        await getDB().updateWalk(id,{joinedUsers:(walk.joinedUsers||[]).filter(u=>u.id!==currentUser.id)});
      };

      const isDetailPage = hashParams?.page==='walk';

      // Nav icons
      const NavIcon = ({ type }) => {
        if (type==='walks') return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
        if (type==='members') return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>;
        if (type==='profile') return <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
        return null;
      };

      return (
        <>
          <header className="header">
            <div className="header-brand" onClick={()=>{goHome();setPage('walks');}}>
              <HikerLogo size={40} className="header-logo"/>
              <span className="header-title">Local Walks</span>
            </div>
            <div className="header-right">
              {currentUser&&!isDetailPage&&(
                <div className="nav-tabs">
                  <button className={`nav-tab ${page==='walks'?'active':''}`} onClick={()=>{setPage('walks');goHome();}}>🥾 Walks</button>
                  <button className={`nav-tab ${page==='members'?'active':''}`} onClick={()=>{setPage('members');goHome();}}>👥 Members</button>
                  <button className={`nav-tab ${page==='profile'?'active':''}`} onClick={()=>{setPage('profile');goHome();}}>👤 My Profile</button>
                </div>
              )}
              {isDetailPage&&<button className="btn-back" onClick={goHome}>← All Walks</button>}
              {currentUser&&<span className="user-badge">👋 {currentUser.name.split(' ')[0]}</span>}
              {currentUser&&<button className="btn-logout" onClick={handleLogout}>Sign out</button>}
            </div>
          </header>

          {isDetailPage ? (
            <WalkDetailPage walkId={hashParams.id} currentUser={currentUser} onLogin={handleLogin}
              onEdit={w=>{setEditingWalk(w);setShowModal(true);}} onCancel={handleCancel}
              onJoin={handleJoin} onLeave={handleLeave} allWalks={walks}/>
          ) : !currentUser ? (
            <main className="main">
              <div className="hero">
                <HikerLogo size={100} className="hero-logo"/>
                <div className="hero-title">Explore Together</div>
                <div className="hero-sub">Organise local walks, invite friends and discover new routes</div>
              </div>
              {dbStatus==='connecting'&&<div className="status-bar connecting" style={{maxWidth:420,margin:'0 auto 20px'}}><div className="status-dot connecting"/> Connecting to database...</div>}
              {dbStatus==='error'&&<div className="status-bar error" style={{maxWidth:420,margin:'0 auto 20px'}}><div className="status-dot error"/> Could not reach database.</div>}
              {dbStatus==='connected'&&<AuthPanel onLogin={handleLogin} context="home"/>}
            </main>
          ) : page==='profile' ? (
            <MyProfilePage currentUser={currentUser} onUpdateUser={handleUpdateUser}/>
          ) : page==='members' ? (
            <MembersPage users={users} currentUser={currentUser}/>
          ) : (
            <WalksPage walks={walks} currentUser={currentUser} dbStatus={dbStatus}
              onEdit={w=>{setEditingWalk(w);setShowModal(true);}} onCancel={handleCancel}
              onJoin={handleJoin} onLeave={handleLeave} onViewDetail={goDetail}
              onNewWalk={()=>{setEditingWalk(null);setShowModal(true);}}
              filter={filter} setFilter={setFilter}/>
          )}

          {/* Mobile bottom nav */}
          {currentUser&&!isDetailPage&&(
            <nav className="mobile-nav">
              {[['walks','Walks'],['members','Members'],['profile','Profile']].map(([key,label])=>(
                <button key={key} className={`mobile-nav-btn ${page===key?'active':''}`} onClick={()=>{setPage(key);goHome();}}>
                  <NavIcon type={key}/>{label}
                </button>
              ))}
            </nav>
          )}

          {showModal&&currentUser&&(
            <WalkModal walk={editingWalk} currentUser={currentUser} mode={editingWalk?'edit':'create'}
              onClose={()=>{setShowModal(false);setEditingWalk(null);}} onSave={handleSaveWalk}/>
          )}
        </>
      );
    }

    function Root() {
      const [ready, setReady] = useState(!!window._db);
      useEffect(()=>{if(!window._db){window.addEventListener('firebase-ready',()=>setReady(true),{once:true});}}, []);
      if(!ready) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontFamily:'DM Sans,sans-serif',color:'#3B5C4A',fontSize:16}}>🌿 Loading...</div>;
      return <App/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
  </script>
</body>
</html>
